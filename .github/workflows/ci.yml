name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    name: Rust (format, clippy, build, test)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Ensure a Rust toolchain is on PATH
        run: |
          # The shared self-hosted runner recurrently loses its rustup
          # proxy binary (~/.cargo/bin/rustup), which dangles all the
          # cargo/rustc symlinks and lets a wrapper earlier on PATH fail
          # with exit 127. Prefer the rustup proxy when it is intact;
          # otherwise fall back to the installed toolchain's real
          # binaries, which survive the proxy going missing.
          if [ -x "$HOME/.cargo/bin/rustup" ] && [ -x "$HOME/.cargo/bin/cargo" ]; then
            echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
            exit 0
          fi
          channel="$(sed -n 's/^[[:space:]]*channel[[:space:]]*=[[:space:]]*"\(.*\)".*/\1/p' rust-toolchain.toml 2>/dev/null)"
          for tc in "$HOME/.rustup/toolchains/${channel}-"* "$HOME/.rustup/toolchains/"*; do
            if [ -x "$tc/bin/cargo" ]; then
              echo "$tc/bin" >> "$GITHUB_PATH"
              exit 0
            fi
          done
          echo "::error::No usable Rust toolchain on this self-hosted runner: rustup proxy missing and no ~/.rustup/toolchains/*/bin/cargo. Reinstall rustup for the runner user." >&2
          exit 1

      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace -- -D warnings
      - run: cargo build --workspace
      - run: cargo test --workspace

  vscode:
    name: VS Code Extension (build, typecheck)
    runs-on: self-hosted
    defaults:
      run:
        working-directory: editors/vscode
    steps:
      - uses: actions/checkout@v4
      - run: npm ci
      - run: npm run build
      - run: npm run typecheck
