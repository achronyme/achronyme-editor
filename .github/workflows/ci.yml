name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    name: Rust (format, clippy, build, test)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Ensure a Rust toolchain is on PATH
        run: |
          # This self-hosted runner is isolated: CARGO_HOME/RUSTUP_HOME
          # point to a private per-runner Rust home so a neighbouring
          # repo sharing the runner user can never clobber this
          # toolchain; both fall back to the user default when unset.
          # Prefer the rustup proxy when intact; otherwise fall back to
          # the installed toolchain's real binaries, which survive the
          # proxy binary going missing.
          cargo_home="${CARGO_HOME:-$HOME/.cargo}"
          rustup_home="${RUSTUP_HOME:-$HOME/.rustup}"
          echo "ISO-CHECK cargo_home=$cargo_home rustup_home=$rustup_home"
          if [ -x "$cargo_home/bin/rustup" ] && [ -x "$cargo_home/bin/cargo" ]; then
            echo "$cargo_home/bin" >> "$GITHUB_PATH"
            exit 0
          fi
          # `|| true` so a missing rust-toolchain.toml (this repo has no
          # pin) does not abort the step under `bash -e`; channel stays
          # empty and the loop falls through to the second glob.
          channel="$(sed -n 's/^[[:space:]]*channel[[:space:]]*=[[:space:]]*"\(.*\)".*/\1/p' rust-toolchain.toml 2>/dev/null || true)"
          for tc in "$rustup_home/toolchains/${channel}-"* "$rustup_home/toolchains/"*; do
            if [ -x "$tc/bin/cargo" ]; then
              echo "$tc/bin" >> "$GITHUB_PATH"
              exit 0
            fi
          done
          echo "::error::No usable Rust toolchain: no rustup proxy and no toolchains/*/bin/cargo under $cargo_home or $rustup_home." >&2
          exit 1

      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace -- -D warnings
      - run: cargo build --workspace
      - run: cargo test --workspace

  vscode:
    name: VS Code Extension (build, typecheck)
    runs-on: self-hosted
    defaults:
      run:
        working-directory: editors/vscode
    steps:
      - uses: actions/checkout@v4
      - run: npm ci
      - run: npm run build
      - run: npm run typecheck
